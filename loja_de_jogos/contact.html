<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <title>Contato - Loja de Jogos</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #000000;
            color: #fff;
        }

        header {
            background-color: #000000;
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .logo i {
            font-size: 32px;
            margin-right: 10px;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav li {
            margin-right: 20px;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 16px;
        }

        .contact {
            text-align: center;
            padding: 50px;
            color: #fff;
        }

        .contact h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .contact p {
            font-size: 18px;
            margin-bottom: 40px;
        }

        .social-icons {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .social-icons li {
            margin: 0 15px;
        }

        .social-icons a {
            text-decoration: none;
            color: #fff;
            font-size: 24px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #000000;
            color: #fff;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html"><i class='bx bx-game'></i> Loja de Jogos</a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Página Inicial</a></li>
                <li><a href="products.html">Produtos</a></li>
                <li><a href="#">Carrinho</a></li>
                <li><a href="contact.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact">
        <h2>Entre em Contato</h2>
        <p>Tem alguma dúvida ou sugestão? Ficaremos felizes em ouvir de você!</p>
        <ul class="social-icons">
            <li><a href="#" target="_blank"><i class='bx bxl-facebook'></i></a></li>
            <li><a href="#" target="_blank"><i class='bx bxl-twitter'></i></a></li>
            <li><a href="#" target="_blank"><i class='bx bxl-instagram'></i></a></li>
            <!-- Adicione mais ícones de mídia social conforme necessário -->
        </ul>
    </section>

    <footer>
        <p>&copy; 2024 Loja de Jogos. Todos os direitos reservados.</p>
    </footer>

</body>

</html>
